<div class="text-analyzer js-text-analyzer">
  <textarea class="textarea js-textarea" type="textarea" rows="7" placeholder="Napisz coś..."></textarea>
  <div class="informations">
    <div class="counter">
      <div>
        Znaki:
        <span class="js-counter-letters">0</span>
      </div>
      <div>
        Znaki bez spacji:
        <span class="js-counter-letters-no-space">0</span>
      </div>
      <div>
        Słowa:
        <span class="js-counter-words">0</span>
      </div>
      <div>
        Zdania:
        <span class="js-counter-sentences">0</span>
      </div>
      <div>
        Standardowe strony tekstu:
        <span class="js-counter-standerd-text-page">0.00</span>
        <br> <div class="text-small">(1800 znaków na stronę)</div>
      </div>
      <div>
        Czas czytania:
        <span class="js-counter-read-time">0.00 min</span>
        <br> <div class="text-small">(ok. 150 słów na min)</div>
      </div>
    </div>
    <div class="btns-wrapper">
      <div class="btn js-btn-cleaner">Wyczyść tekst</div>
      <div class="btn js-btn-eraser">Usuń tekst</div>
    </div>
  </div>
</div>
